name: release-gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt check
        run: cargo fmt -- --check
      - name: Clippy strict
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --verbose
