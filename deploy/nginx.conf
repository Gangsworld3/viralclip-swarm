events {}

http {
  server_tokens off;
  sendfile on;
  keepalive_timeout 15s;
  client_body_timeout 15s;
  client_header_timeout 15s;
  send_timeout 15s;
  server_names_hash_bucket_size 64;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  upstream viralclip_backend {
    server 127.0.0.1:8787;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

    client_max_body_size 1m;
    limit_conn conn_limit 20;

    location / {
      limit_req zone=api_limit burst=10 nodelay;
      if ($request_method !~ ^(GET|POST)$) { return 405; }
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_buffering off;
      proxy_request_buffering on;
      proxy_pass http://viralclip_backend;
    }
  }
}
